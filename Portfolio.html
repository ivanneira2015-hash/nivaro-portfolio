<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="author" content="Walter Iván Neira Astuena" />
  <meta name="keywords" content="Walter Neira, Nivaro, Full Stack Developer, React, Node.js, TypeScript, PostgreSQL, Argentina, desarrollador web" />
  <meta property="og:title" content="Nivaro — Walter Neira · Full Stack Developer" />
  <meta property="og:description" content="Desarrollador Full Stack en Argentina. React · Node.js · TypeScript · PostgreSQL." />
  <meta property="og:type" content="website" />
  <title>Nivaro — Walter Neira · Full Stack Developer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;700&display=swap');

    :root {
      --pink: #FF2D78;
      --cyan: #00E5FF;
      --dark: #0A0A0F;
      --surface: #12121A;
      --text: #E8E8F0;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--dark);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
    }

    body {
      cursor: none;
    }

    @media (max-width: 768px) {
      body { cursor: auto; }
    }

    .font-display {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.02em;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Custom cursor */
    .cursor-dot {
      position: fixed;
      top: 0;
      left: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan), 0 0 24px var(--cyan);
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: screen;
    }
    .cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--pink);
      box-shadow: 0 0 12px rgba(255,45,120,0.5);
      pointer-events: none;
      z-index: 9998;
      mix-blend-mode: screen;
    }

    /* Scanlines */
    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.06) 0px,
        rgba(255,255,255,0.06) 1px,
        transparent 1px,
        transparent 3px
      );
      opacity: 0.4;
      z-index: 5;
      mix-blend-mode: overlay;
    }

    /* Neon glow text */
    .neon-pink {
      color: var(--text);
      text-shadow:
        0 0 8px rgba(255,45,120,0.9),
        0 0 24px rgba(255,45,120,0.6),
        0 0 60px rgba(255,45,120,0.4);
    }
    .neon-cyan {
      color: var(--cyan);
      text-shadow:
        0 0 8px rgba(0,229,255,0.9),
        0 0 24px rgba(0,229,255,0.6),
        0 0 60px rgba(0,229,255,0.3);
    }

    /* Glitch keyframes */
    @keyframes glitch-anim {
      0%, 100% { transform: translate(0); clip-path: inset(0 0 0 0); }
      10% { transform: translate(-2px, 1px); clip-path: inset(20% 0 30% 0); }
      20% { transform: translate(2px, -1px); clip-path: inset(60% 0 10% 0); }
      30% { transform: translate(-1px, 2px); clip-path: inset(40% 0 50% 0); }
      40% { transform: translate(1px, -2px); clip-path: inset(10% 0 70% 0); }
      50% { transform: translate(0); clip-path: inset(0 0 0 0); }
    }
    .glitch {
      position: relative;
      display: inline-block;
    }
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .glitch::before {
      color: var(--pink);
      animation: glitch-anim 3s infinite linear alternate-reverse;
      transform: translate(-2px, 0);
      mix-blend-mode: screen;
    }
    .glitch::after {
      color: var(--cyan);
      animation: glitch-anim 2.4s infinite linear alternate;
      transform: translate(2px, 0);
      mix-blend-mode: screen;
    }

    /* Project card */
    .project-card {
      --glow: rgba(255,45,120,0.3);
      background: linear-gradient(180deg, #14141C 0%, #0E0E14 100%);
      border: 1px solid var(--glow);
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
      position: relative;
      overflow: hidden;
    }
    .project-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(255,45,120,0.05) 100%);
      pointer-events: none;
    }
    .project-card:hover {
      --glow: rgba(0,229,255,0.6);
      box-shadow: 0 0 40px rgba(0,229,255,0.25), inset 0 0 30px rgba(0,229,255,0.05);
    }

    /* Form inputs */
    .cyber-input {
      background: rgba(18,18,26,0.6);
      border: 1px solid rgba(232,232,240,0.15);
      border-radius: 0;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      transition: border-color 0.3s ease;
      width: 100%;
      padding: 14px 16px;
      outline: none;
    }
    .cyber-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 12px rgba(0,229,255,0.4), inset 0 0 8px rgba(0,229,255,0.08);
    }

    /* Pulse */
    @keyframes pulse-pink {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,45,120,0.6), 0 0 24px rgba(255,45,120,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(255,45,120,0), 0 0 32px rgba(255,45,120,0.7); }
    }
    .pulse-btn {
      animation: pulse-pink 2.2s infinite;
    }

    /* Section dividers */
    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: 0.85;
    }
    .section-tag::before {
      content: "";
      width: 24px;
      height: 1px;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }

    /* Skill badge */
    .skill-badge {
      border: 1px solid rgba(0,229,255,0.35);
      background: rgba(0,229,255,0.04);
      color: var(--text);
      padding: 6px 12px;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.25s ease;
    }
    .skill-badge:hover {
      border-color: var(--pink);
      background: rgba(255,45,120,0.08);
      color: var(--pink);
      box-shadow: 0 0 12px rgba(255,45,120,0.3);
    }

    /* Bounce arrow */
    @keyframes bounce-y {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(10px); opacity: 0.5; }
    }
    .bounce-arrow { animation: bounce-y 1.8s ease-in-out infinite; }

    /* Nav blur */
    .nav-blur {
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      background: rgba(10,10,15,0.55);
      border-bottom: 1px solid rgba(255,45,120,0.15);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--pink), var(--cyan));
      border-radius: 0;
    }

    /* Hero overlay */
    .hero-vignette {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(10,10,15,0.4) 0%, rgba(10,10,15,0.2) 40%, rgba(10,10,15,1) 100%),
        radial-gradient(circle at 50% 40%, transparent 0%, rgba(10,10,15,0.6) 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* Grid bg */
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,45,120,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Hover targets for cursor */
    a, button, input, textarea, .hover-target {
      cursor: none;
    }
    @media (max-width: 768px) {
      a, button, input, textarea, .hover-target { cursor: auto; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="image-slot.js"></script>
  <script type="text/babel" data-presets="react" src="Portfolio.jsx"></script>
</body>
</html>
