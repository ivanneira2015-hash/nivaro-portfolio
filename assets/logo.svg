<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="gradN" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF2D78"></stop>
      <stop offset="100%" stop-color="#00E5FF"></stop>
    </linearGradient>
    <linearGradient id="gradLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF2D78" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#FF2D78"></stop>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="glowL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  

  
  <g transform="translate(20, 22)" filter="url(#glowL)">
    
    <path d="M4 14 V4 H14" fill="none" stroke="#FF2D78" stroke-width="2.5" stroke-linecap="square"></path>
    <path d="M62 4 H72 V14" fill="none" stroke="#FF2D78" stroke-width="2.5" stroke-linecap="square"></path>
    <path d="M72 62 V72 H62" fill="none" stroke="#00E5FF" stroke-width="2.5" stroke-linecap="square"></path>
    <path d="M14 72 H4 V62" fill="none" stroke="#00E5FF" stroke-width="2.5" stroke-linecap="square"></path>

    
    <line x1="20" y1="20" x2="20" y2="56" stroke="#FF2D78" stroke-width="5" stroke-linecap="square"></line>
    <line x1="20" y1="20" x2="56" y2="56" stroke="url(#gradN)" stroke-width="5" stroke-linecap="square"></line>
    <line x1="56" y1="20" x2="56" y2="56" stroke="#00E5FF" stroke-width="5" stroke-linecap="square"></line>

    
    <circle cx="56" cy="20" r="3" fill="#FF2D78"></circle>
    <circle cx="20" cy="56" r="3" fill="#00E5FF"></circle>
  </g>

  
  <g transform="translate(130, 0)">
    
    <text x="0" y="40" font-family="&#39;JetBrains Mono&#39;, &#39;Courier New&#39;, monospace" font-size="10" letter-spacing="6" fill="#00E5FF" opacity="0.85">// W.NEIRA · DEV</text>

    
    <text x="0" y="78" font-family="&#39;Bebas Neue&#39;, &#39;Impact&#39;, sans-serif" font-size="58" letter-spacing="6" fill="#E8E8F0" filter="url(#glowL)">NIVARO</text>

    
    <line x1="0" y1="92" x2="280" y2="92" stroke="url(#gradLine)" stroke-width="1"></line>

    
    <text x="0" y="108" font-family="&#39;JetBrains Mono&#39;, &#39;Courier New&#39;, monospace" font-size="9" letter-spacing="4" fill="#E8E8F0" opacity="0.45">FULL_STACK · SOFTWARE · 2026</text>
  </g>

  
  <g transform="translate(450, 30)" font-family="&#39;JetBrains Mono&#39;, monospace" font-size="8" fill="#FF2D78" opacity="0.7" letter-spacing="2">
    <text x="0" y="0" text-anchor="end">●</text>
    <text x="0" y="14" text-anchor="end" fill="#E8E8F0" opacity="0.35">REC</text>
  </g>
